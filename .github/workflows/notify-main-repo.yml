name: Notify main repo

on:
  push:
    branches: [master, main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build in gigurd repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GIGURD_REPO_TOKEN }}
          repository: gigurd/Design-of-digital-systems-62711
          event-type: pwb-report-updated
